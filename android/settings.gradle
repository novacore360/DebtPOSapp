pluginManagement {
    def flutterSdkPath = {
        // 1. Try local.properties first (local dev machines)
        def localPropsFile = file("local.properties")
        if (localPropsFile.exists()) {
            def properties = new Properties()
            localPropsFile.withInputStream { properties.load(it) }
            def path = properties.getProperty("flutter.sdk")
            if (path != null) return path
        }
        // 2. Fall back to FLUTTER_ROOT env var (CI: GitHub Actions, Codemagic, Bitrise)
        def envPath = System.getenv("FLUTTER_ROOT")
        if (envPath != null) return envPath
        // 3. Try FVM (Flutter Version Manager) convention
        def fvmPath = System.getenv("FVM_HOME")
        if (fvmPath != null) return fvmPath

        throw new GradleException(
            "Flutter SDK not found. Set flutter.sdk in android/local.properties, " +
            "or set the FLUTTER_ROOT environment variable."
        )
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application"           version "8.3.2" apply false
    id "org.jetbrains.kotlin.android"      version "1.9.22" apply false
    id "com.google.gms.google-services"    version "4.4.2" apply false
}

include ":app"
